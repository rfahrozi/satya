services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: satya_app_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: npm run dev:api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - satya-net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: satya_worker_dev
    restart: unless-stopped
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["npm", "run", "start:worker"]
    healthcheck:
      disable: true
    networks:
      - satya-net

  db:
    image: postgres:15-alpine
    container_name: satya_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satya-net

  redis:
    image: redis:7-alpine
    container_name: satya_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_dev:/data
    networks:
      - satya-net

  minio:
    image: minio/minio:latest
    container_name: satya_minio_dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - satya-net

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:
  backend_node_modules:

networks:
  satya-net:
    driver: bridge

