version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: monev_app
    restart: unless-stopped
    ports:
      - "3004:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["npm", "run", "start:api"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - monev-net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: monev_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["npm", "run", "start:worker"]
    healthcheck:
      disable: true
    networks:
      - monev-net

  db:
    image: postgres:15-alpine
    container_name: monev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Port removed to prevent host conflict. Accessible internally via monev-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: monev_redis
    restart: unless-stopped
    networks:
      - monev-net
    # Port removed to prevent host conflict. Accessible internally via monev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: monev_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    # Port removed to prevent host conflict. Accessible internally via monev-net
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - monev-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  monev-net:
    driver: bridge
