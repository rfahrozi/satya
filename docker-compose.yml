version: '3.8'

services:
  app:
    build: .
    container_name: satya_app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    command: npm run dev:api

  worker:
    build: .
    container_name: satya_worker
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    command: npm run start:worker

  db:
    image: postgres:15-alpine
    container_name: satya_postgres
    environment:
      POSTGRES_USER: satya_admin
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: satya_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: satya_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: satya_minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secure_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"